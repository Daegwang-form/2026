<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대광고 중학생 진로체험 신청</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep: #1a4d2e;
      --green-mid: #2d7a4f;
      --green-bright: #3aab68;
      --green-light: #e8f5ee;
      --green-pale: #f4fbf7;
      --gold: #c9a84c;
      --text-dark: #1c2b22;
      --text-mid: #4a6358;
      --text-light: #8aab98;
      --white: #ffffff;
    }

    body {
      min-height: 100vh;
      background: var(--green-pale);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(58,171,104,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(26,77,46,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(26,77,46,0.10);
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: linear-gradient(145deg, var(--green-deep) 0%, var(--green-mid) 100%);
      padding: 40px 36px 36px;
      position: relative;
    }

    .school-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 8px 18px;
      margin-bottom: 20px;
    }
    .school-badge span {
      font-size: 14px;
      font-weight: 600;
      color: white;
    }
    .school-badge-dot {
      width: 8px; height: 8px;
      background: var(--green-bright);
      border-radius: 50%;
    }

    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
    }
    .card-title em { font-style: normal; color: #7de8a8; }
    .card-subtitle { margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.6); }

    .card-body { padding: 32px 36px 36px; }

    .consent-box {
      background: var(--green-light);
      border: 1.5px solid #b6dfc6;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 28px;
    }
    .consent-text { font-size: 12.5px; color: var(--text-mid); line-height: 1.7; margin-bottom: 12px; }
    .consent-label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .consent-label input { display: none; }
    .checkbox-custom {
      width: 20px; height: 20px;
      border: 2px solid #b6dfc6;
      border-radius: 6px;
      background: white;
      display: flex; align-items: center; justify-content: center;
    }
    .consent-label input:checked + .checkbox-custom { background: var(--green-mid); border-color: var(--green-mid); }
    .checkbox-check { width: 10px; height: 10px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; }

    .section { margin-bottom: 24px; }
    .field-label { display: block; font-size: 11.5px; font-weight: 600; color: var(--text-mid); margin-bottom: 8px; }
    .input-field {
      width: 100%; padding: 13px 16px; border: 1.5px solid #d4e8dc; border-radius: 12px;
      background: var(--green-pale); font-size: 14px; outline: none; transition: 0.2s;
    }
    .input-field:focus { border-color: var(--green-bright); background: white; }

    .gender-group { display: flex; gap: 10px; }
    .gender-option { flex: 1; cursor: pointer; }
    .gender-option input { display: none; }
    .gender-btn {
      display: block; text-align: center; padding: 12px; border: 1.5px solid #d4e8dc;
      border-radius: 12px; background: var(--green-pale); font-size: 14px; transition: 0.2s;
    }
    .gender-option input:checked + .gender-btn { background: var(--green-mid); border-color: var(--green-mid); color: white; }

    .program-options { display: flex; flex-direction: column; gap: 10px; }
    .program-option input { display: none; }
    .program-btn {
      display: block; padding: 14px 16px; border: 1.5px solid #d4e8dc; border-radius: 12px;
      background: var(--green-pale); transition: 0.2s; cursor: pointer;
    }
    .program-option input:checked + .program-btn { border-color: var(--green-mid); background: #e8f5ee; }
    
    /* 마감 스타일 */
    .program-option.closed { opacity: 0.6; cursor: not-allowed; }
    .program-option input:disabled + .program-btn { background: #eee; border-color: #ccc; cursor: not-allowed; }
    .closed-tag { color: #ff4d4f; font-weight: bold; margin-left: 5px; }

    .program-date { font-size: 11px; font-weight: 600; color: var(--green-mid); margin-bottom: 4px; }
    .program-title { font-size: 13.5px; font-weight: 500; color: var(--text-dark); }

    .submit-btn {
      width: 100%; padding: 18px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
      color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

    .success-overlay { display: none; flex-direction: column; align-items: center; padding: 60px 36px; text-align: center; }
    .success-icon { width: 80px; height: 80px; background: var(--green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: var(--green-mid); }
    .card-footer { text-align: center; padding: 0 36px 28px; font-size: 11.5px; color: var(--text-light); }
    .divider { height: 1px; background: linear-gradient(to right, transparent, #d4e8dc, transparent); margin-bottom: 24px; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="school-badge"><div class="school-badge-dot"></div><span>대광고등학교</span></div>
    <h1 class="card-title">중학생 <em>진로체험</em> 신청</h1>
    <p class="card-subtitle">2026 미래를 향한 첫 걸음을 함께합니다</p>
  </div>

  <div class="card-body" id="formBody">
    <div class="consent-box">
      <p class="consent-text">원활한 진로체험 운영을 위해 이름, 전화번호 등 개인정보 활용에 동의하십니까?</p>
      <label class="consent-label">
        <input type="checkbox" id="consent">
        <div class="checkbox-custom"><svg class="checkbox-check" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div>
        <span class="consent-label-text">위 내용에 동의합니다</span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="section"><label class="field-label">이름</label><input class="input-field" type="text" id="name" placeholder="성함을 입력하세요"></div>
    <div class="section">
      <span class="field-label">성별</span>
      <div class="gender-group">
        <label class="gender-option"><input type="radio" name="gender" value="남"><span class="gender-btn">남 ♂</span></label>
        <label class="gender-option"><input type="radio" name="gender" value="여"><span class="gender-btn">여 ♀</span></label>
      </div>
    </div>
    <div class="section"><label class="field-label">연락처</label><input class="input-field" type="tel" id="contact" placeholder="010-0000-0000" maxlength="13"></div>
    <div class="section"><label class="field-label">학교명</label><input class="input-field" type="text" id="school" placeholder="중학교 이름을 입력하세요"></div>
    <div class="section"><label class="field-label">학번</label><input class="input-field" type="text" id="studentId" placeholder="예: 30101"></div>

    <div class="section">
      <label class="field-label">희망 과정</label>
      <select class="input-field" id="course" onchange="handleCourseChange(this.value)">
        <option value="" disabled selected>계열을 선택해 주세요</option>
        <option value="beauty">미용계열</option>
        <option value="design">디자인계열</option>
      </select>
    </div>

    <div class="section" id="programSection" style="display:none;">
      <label class="field-label">체험 프로그램 선택</label>
      <div class="program-options" id="programOptions"></div>
    </div>

    <button class="submit-btn" onclick="handleSubmit()">신청하기 →</button>
  </div>

  <div class="success-overlay" id="successOverlay">
    <div class="success-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
    <h2 style="margin-bottom:10px">신청 완료!</h2>
    <p>정상적으로 접수되었습니다. 감사합니다 😊</p>
  </div>
  <p class="card-footer" id="footerTxt">개인정보는 운영 목적으로만 사용됩니다.</p>
</div>

<script>
  // 프로그램 데이터 및 마감 설정
  const programs = {
    beauty: [
      { date: '5월 16일 (토)', title: '내 취향 100% 나만의 네일 팁 만들기', closed: true }, // 마감 처리됨
      { date: '6월 13일 (토)', title: '나만의 색을 찾아보자 (퍼스널컬러 진단 등)', closed: false },
    ],
    design: [
      { date: '5월 23일 (토)', title: 'AI 굿즈 스튜디오 (아크릴 스탠드 & 키링)', closed: false },
      { date: '6월 20일 (토)', title: 'AI 굿즈 스튜디오 (스탬프 도장 & 슈링클스)', closed: false },
    ],
  };

  function handleCourseChange(val) {
    const section = document.getElementById('programSection');
    const container = document.getElementById('programOptions');
    container.innerHTML = '';
    if (!programs[val]) { section.style.display = 'none'; return; }
    
    programs[val].forEach((p) => {
      const isDisabled = p.closed ? 'disabled' : '';
      const closedClass = p.closed ? 'closed' : '';
      const closedTag = p.closed ? '<span class="closed-tag">(마감)</span>' : '';

      container.innerHTML += `
        <label class="program-option ${closedClass}">
          <input type="radio" name="program" value="${p.date} ${p.title}" ${isDisabled}>
          <span class="program-btn">
            <div class="program-date">${p.date}${closedTag}</div>
            <div class="program-title">${p.title}</div>
          </span>
        </label>`;
    });
    section.style.display = 'block';
  }

  // 전화번호 자동 하이픈
  document.getElementById('contact').addEventListener('input', function(e) {
    let v = e.target.value.replace(/[^0-9]/g, '');
    if (v.length > 3 && v.length <= 7) v = v.slice(0,3) + '-' + v.slice(3);
    else if (v.length > 7) v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
    e.target.value = v;
  });

  function handleSubmit() {
    const consent = document.getElementById('consent').checked;
    const name = document.getElementById('name').value.trim();
    const gender = document.querySelector('input[name="gender"]:checked');
    const contact = document.getElementById('contact').value.trim();
    const school = document.getElementById('school').value.trim();
    const studentId = document.getElementById('studentId').value.trim();
    const course = document.getElementById('course').value;
    const program = document.querySelector('input[name="program"]:checked');

    if (!consent) return alert('개인정보 활용 동의가 필요합니다.');
    if (!name || !gender || !contact || !school || !studentId || !program) return alert('모든 항목을 입력해 주세요.');

    const btn = document.querySelector('.submit-btn');
    btn.textContent = '제출 중...';
    btn.disabled = true;

    const formData = new FormData();
    formData.append('name', name);
    formData.append('gender', gender.value);
    formData.append('contact', contact);
    formData.append('school', school);
    formData.append('studentId', studentId);
    formData.append('course', document.getElementById('course').options[document.getElementById('course').selectedIndex].text);
    formData.append('program', program.value);

    fetch('https://script.google.com/macros/s/AKfycbzBG_0CjFPUIAHF-eyoTbL3-Zb9Gt0F_bTsRb2B3nj28dc50Yxec7exzYv9QEbyVvZG/exec', {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    }).then(() => {
      document.getElementById('formBody').style.display = 'none';
      document.getElementById('successOverlay').style.display = 'flex';
      document.getElementById('footerTxt').style.display = 'none';
      window.scrollTo(0,0);
    }).catch(() => {
      alert('오류가 발생했습니다.');
      btn.textContent = '신청하기 →';
      btn.disabled = false;
    });
  }
</script>
</body>
</html>
